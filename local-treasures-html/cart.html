<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart & Checkout | Local Treasures</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 font-sans">
    
    <nav class="bg-white shadow flex justify-between items-center px-6 py-4 sticky top-0 z-50">
        <a href="buyer-dashboard.html" class="text-xl font-bold text-neutral-900">← Back to Shop</a>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-extrabold text-neutral-900 mb-8">Secure Checkout</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Cart Items -->
            <div class="flex-1 space-y-4" id="cart-item-list">
                <h2 class="text-xl font-bold border-b pb-2">Order Items</h2>
                <div id="dynamic-cart-container" class="space-y-4">
                    <!-- Dynamic cart items will render here via JS -->
                </div>
            </div>

            <!-- Checkout Details -->
            <div class="w-full lg:w-96 bg-white p-6 rounded-2xl shadow-lg border border-neutral-100 h-fit">
                <h2 class="text-xl font-bold mb-4">Payment & Shipping</h2>
                
                <div class="space-y-3 mb-6 bg-neutral-50 p-4 rounded-lg">
                    <div class="flex justify-between text-sm text-neutral-600"><span>Subtotal</span> <span id="subtotal">₹0</span></div>
                    <div class="flex justify-between text-sm text-neutral-600"><span>Shipping</span> <span class="text-emerald-600 font-bold">Free</span></div>
                    <div class="flex justify-between text-lg font-bold pt-2 border-t mt-2"><span>Total</span> <span id="total">₹0</span></div>
                </div>

                <label class="block text-sm font-bold text-neutral-700 mb-2">Payment Method</label>
                <div class="space-y-2 mb-6">
                    <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-neutral-50">
                        <input type="radio" name="payment" value="UPI" class="text-emerald-600 focus:ring-emerald-500" checked>
                        <span class="font-medium">UPI (GPay, PhonePe)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-neutral-50">
                        <input type="radio" name="payment" value="COD" class="text-emerald-600 focus:ring-emerald-500">
                        <span class="font-medium">Cash on Delivery (COD)</span>
                    </label>
                </div>

                <div class="mb-6">
                    <p class="text-sm text-neutral-500 mb-2">You will be asked for delivery address and details accurately on the next screen.</p>
                </div>

                <a href="checkout.html" class="block text-center w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-4 rounded-xl shadow-lg transition">Proceed to Checkout</a>
            </div>
        </div>
    </main>

    <script src="db.js"></script>
    <script>
        window.onload = function() {
            renderCart();
        };

        function renderCart() {
            const container = document.getElementById('dynamic-cart-container');
            const cart = getCart();
            const allProducts = getProducts();
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-neutral-500 py-8 text-center text-lg">Your cart is empty.</p>';
                updateTotals(0);
                return;
            }

            container.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const prod = allProducts.find(p => p.id === item.productId);
                if (prod) {
                    const itemTotal = prod.price * item.qty;
                    total += itemTotal;
                    
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-neutral-100 flex items-center gap-4 cart-item" data-price="${itemTotal}">
                            <img src="${prod.img || prod.image || 'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=150&auto=format&fit=crop'}" class="h-20 w-20 rounded-lg object-cover">
                            <div class="flex-1">
                                <span class="text-xs text-neutral-500">ID: ${prod.id}</span>
                                <h3 class="font-bold text-neutral-900">${prod.name}</h3>
                                <p class="text-sm text-neutral-500">From: ${prod.sellerName || prod.seller}</p>
                                <p class="text-xs text-neutral-500 mt-1">Qty: ${item.qty}</p>
                            </div>
                            <div class="text-right flex flex-col items-end gap-1">
                                <button onclick="removeItem(this, '${prod.id}')" class="text-red-500 hover:text-red-700 text-sm font-bold bg-red-50 px-2 py-1 rounded-lg transition">Remove</button>
                                <span class="font-bold text-lg">₹${itemTotal}</span>
                            </div>
                        </div>
                    `;
                }
            });
            updateTotals(total);
        }

        function removeItem(btn, productId) {
            removeFromCart(productId);
            renderCart();
        }
        
        function updateTotals(total) {
            document.getElementById('subtotal').innerText = '₹' + total;
            document.getElementById('total').innerText = '₹' + total;
        }
    </script>
</body>
</html>
