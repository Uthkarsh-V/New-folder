<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Local Treasures</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 font-sans">
    
    <nav class="bg-white shadow flex justify-between items-center px-6 py-4 sticky top-0 z-50">
        <a href="buyer-dashboard.html" class="text-xl font-bold text-neutral-900 flex items-center"><span class="mr-2">←</span> Store</a>
        <h1 class="font-bold text-emerald-700">Order History</h1>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-extrabold text-neutral-900 mb-8">Track Your Treasures</h1>

        <div id="orders-container">
            <!-- Dynamic orders will be pushed here -->
        </div>

    </main>
    <script src="db.js"></script>
    <script>
        window.onload = function() {
            const user = getCurrentUser();
            if (!user) window.location.href = 'index.html';

            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';
            
            const user = getCurrentUser();
            const allOrders = getOrders();
            const myOrders = allOrders.filter(o => o.buyerId === user.id).reverse(); // Newest first

            if (myOrders.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-12 bg-white rounded-2xl border border-neutral-100 shadow-sm">
                        <div class="text-5xl mb-4">🛒</div>
                        <h2 class="text-2xl font-bold text-neutral-800 mb-2">No orders yet</h2>
                        <p class="text-neutral-500 mb-4">You haven't bought anything from local artisans yet.</p>
                        <a href="buyer-dashboard.html" class="inline-block bg-emerald-600 px-6 py-3 text-white font-bold rounded-xl shadow-md hover:bg-emerald-700">Start Shopping</a>
                    </div>
                `;
                return;
            }

            myOrders.forEach(order => {
                let progressWidth = '0%';
                let s1 = '', s2 = '', s3 = '', s4 = '', s5 = '';
                
                // Map Seller's status strings to tracking UI
                if(order.status === 'Paid') {
                    progressWidth = '10%'; s1 = 'active'; 
                } else if(order.status === 'Processing') {
                    progressWidth = '35%'; s1 = 'done'; s2 = 'active';
                } else if(order.status === 'Shipped') {
                    progressWidth = '60%'; s1 = 'done'; s2 = 'done'; s3 = 'active';
                } else if(order.status === 'Out for Delivery') {
                    progressWidth = '85%'; s1 = 'done'; s2 = 'done'; s3 = 'done'; s4 = 'active';
                } else if(order.status === 'Delivered') {
                    progressWidth = '100%'; s1 = 'done'; s2 = 'done'; s3 = 'done'; s4 = 'done'; s5 = 'done';
                }

                const getIconHtml = (state, label, icon) => {
                    let circleClass = "h-10 w-10 rounded-full flex items-center justify-center font-bold shadow-md z-10 ";
                    let textClass = "text-xs font-bold mt-2 text-center text-emerald-700 w-24 leading-snug";
                    let inner = `✓`;

                    if (state === 'done') {
                        circleClass += "bg-emerald-500 text-white";
                    } else if (state === 'active') {
                        circleClass += "bg-white border-2 border-emerald-500 text-emerald-500 relative";
                        inner = `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-20"></span>${icon}`;
                    } else { // future step
                        circleClass += "bg-neutral-200 text-neutral-400 border-2 border-white";
                        textClass = "text-xs font-medium mt-2 text-center text-neutral-400 w-24 leading-snug";
                        inner = icon;
                    }

                    return `
                    <div class="flex flex-col items-center">
                        <div class="${circleClass}">${inner}</div>
                        <span class="${textClass}">${label}</span>
                    </div>
                    `;
                };

                const orderHtml = `
                <div class="bg-white rounded-2xl shadow-md border border-neutral-100 p-6 mb-8 overflow-hidden">
                    <div class="flex flex-col md:flex-row justify-between mb-8 pb-4 border-b">
                        <div>
                            <h2 class="text-xl font-bold">Order #${order.id}</h2>
                            <p class="text-sm text-neutral-500 capitalize">Method: ${order.method}</p>
                        </div>
                        <div class="mt-4 md:mt-0 text-left md:text-right">
                            <p class="text-neutral-500 text-xs uppercase tracking-wide">Current Status</p>
                            <p class="text-lg font-extrabold text-emerald-600">${order.status || 'Paid'}</p>
                        </div>
                    </div>

                    <!-- Items -->
                    <div class="flex items-center gap-4 mb-10 bg-neutral-50 p-4 rounded-xl">
                        <div class="h-16 w-16 bg-neutral-200 rounded-md flex items-center justify-center text-2xl">📦</div>
                        <div>
                            <h3 class="font-bold text-neutral-900">${order.items.join(', ')}</h3>
                            <p class="text-xs text-neutral-500">Shipped together</p>
                        </div>
                    </div>

                    <!-- Linear Tracking Animation -->
                    <div class="relative w-full overflow-x-auto pb-4">
                        <div class="min-w-[500px]">
                            <!-- Progress Line Background -->
                            <div class="absolute top-[20px] left-10 right-10 h-1 md:h-1.5 bg-neutral-200 rounded-full z-0"></div>
                            <!-- Active Progress Line -->
                            <div class="absolute top-[20px] left-10 h-1 md:h-1.5 bg-emerald-500 rounded-full transition-all duration-1000 ease-in-out z-0" style="width: ${progressWidth}; max-width: calc(100% - 80px);"></div>

                            <div class="relative flex justify-between z-10 px-4">
                                ${getIconHtml(s1, 'Confirmed', '📝')}
                                ${getIconHtml(s2, 'Processing', '⚒️')}
                                ${getIconHtml(s3, 'Shipped', '📍')}
                                ${getIconHtml(s4, 'Out for Delivery', '🚚')}
                                ${getIconHtml(s5, 'Delivered', '🏠')}
                            </div>
                        </div>
                    </div>
                </div>
                `;

                container.innerHTML += orderHtml;
            });
        }
    </script>
</body>
</html>
